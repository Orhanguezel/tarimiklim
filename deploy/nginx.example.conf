# Ornek: reverse proxy (Let's Encrypt sertifikasi certbot ile ayri eklenir)
# server_name ve upstream portlari ortaminiza gore duzenleyin.

upstream hava_api {
    server 127.0.0.1:8088;
}

upstream hava_public_web {
    server 127.0.0.1:3088;
}

upstream hava_admin_web {
    server 127.0.0.1:3048;
}

server {
    listen 80;
    server_name hava.example.com;

    location /api/ {
        proxy_pass http://hava_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://hava_public_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name admin.hava.example.com;

    location / {
        proxy_pass http://hava_admin_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
